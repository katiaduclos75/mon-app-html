function fmt(cents){
  const neg = cents < 0;
  const abs = Math.abs(cents);
  const e = Math.floor(abs/100);
  const c = abs%100;
  const s = e.toLocaleString('fr-FR') + ',' + (c<10?'0'+c:c) + ' €';
  return neg ? '-'+s : s;
}

function randInt(a,b){return a+Math.floor(Math.random()*(b-a+1))}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=randInt(0,i);[arr[i],arr[j]]=[arr[j],arr[i]]}return arr}

function genPrice(min,max,step){
  const steps=Math.floor((max-min)/step);
  return min+Math.floor(Math.random()*(steps+1))*step;
}

function pickPayment(price,difficulty){
  const amounts=[200,500,1000,2000,5000,10000,15000,20000,25000,30000,35000,40000,50000,60000,75000,100000];
  const minCh = difficulty==='easy'?50:10;
  const valid=amounts.filter(a=>a-price>=minCh);
  if(!valid.length) return Math.ceil((price+1000)/10000)*10000;
  const opts=valid.slice(0,Math.min(difficulty==='hard'?2:3,valid.length));
  return opts[randInt(0,opts.length-1)];
}

function describePayment(cents){
  const d=[[50000,"billet","500 €"],[20000,"billet","200 €"],[10000,"billet","100 €"],[5000,"billet","50 €"],[2000,"billet","20 €"],[1000,"billet","10 €"],[500,"billet","5 €"],[200,"pièce","2 €"],[100,"pièce","1 €"],[50,"pièce","50 cts"]];
  let rem=cents;const parts=[];
  for(const[val,type,name]of d){const count=Math.floor(rem/val);if(count>0){parts.push(count>1?count+'×'+name:name);rem-=count*val}}
  return parts.join(' + ');
}

function decomposeMoney(cents){
  const d=[[20000,"200€"],[10000,"100€"],[5000,"50€"],[2000,"20€"],[1000,"10€"],[500,"5€"],[200,"2€"],[100,"1€"],[50,"50c"],[20,"20c"],[10,"10c"],[5,"5c"],[2,"2c"],[1,"1c"]];
  let rem=cents;const parts=[];
  for(const[val,name]of d){while(rem>=val){parts.push(name);rem-=val}}
  return parts;
}

function denomLabel(val){
  if(val>=100)return(val/100)+'€';
  return val+'c';
}

function denomIsBill(val){return val>=500}
function denomIsCoin(val){return val<500}
function coinClass(val){
  if(val<=5)return'coin-copper';
  if(val<=50)return'coin-gold';
  return'coin-bimetal';
}
function billClass(val){
  if(val>=10000)return'bill-100';
  if(val>=5000)return'bill-50';
  if(val>=2000)return'bill-20';
  if(val>=1000)return'bill-10';
  return'bill-5';
}

// ════════════════════════════════════════════
// GAME LOGIC
// ════════════════════════════════════════════
function startGame(diff){
  const cfg=CONFIGS[diff];
  const pool=POOLS[diff];
  const indices=shuffle([...Array(pool.length).keys()]).slice(0,Math.min(cfg.count,pool.length));
  const purchases=indices.map(i=>{
    const[emoji,store,item,min,max]=pool[i];
    const price=genPrice(min,max,cfg.step);
    const payment=pickPayment(price,diff);
    return{emoji,store,item,price,payment};
  });
  // Ensure total doesn't exceed budget by too much
  let total=purchases.reduce((s,p)=>s+p.price,0);
  const maxTotal=cfg.budget*0.85;
  if(total>maxTotal){
    const ratio=maxTotal/total;
    purchases.forEach(p=>{
      p.price=Math.round(p.price*ratio/cfg.step)*cfg.step;
      if(p.price<cfg.step)p.price=cfg.step;
      p.payment=pickPayment(p.price,diff);
    });
  }
  S={
    screen:'game',difficulty:diff,
    budget:cfg.budget,initialBudget:cfg.budget,
    purchaseIndex:0,purchases,
    composerItems:[],composerTotal:0,
    attempts:0,maxAttempts:cfg.attempts,
    correct:0,wrong:0,streak:0,bestStreak:0,
    history:[],feedback:null,gameOver:false
  };
  render();
}

function addDenom(val){
  S.composerItems.push(val);
  S.composerTotal+=val;
  updateComposer();
}

function removeDenom(idx){
  S.composerTotal-=S.composerItems[idx];
  S.composerItems.splice(idx,1);
  updateComposer();
}

function clearComposer(){
  S.composerItems=[];S.composerTotal=0;
  updateComposer();
}

function validateChange(){
  const p=S.purchases[S.purchaseIndex];
  const correctChange=p.payment-p.price;
  if(S.composerTotal===correctChange){
    // CORRECT
    S.correct++;S.streak++;
    if(S.streak>S.bestStreak)S.bestStreak=S.streak;
    S.budget-=p.price;
    S.history.push({correct:true,purchase:p,answer:S.composerTotal,expected:correctChange});
    S.feedback={correct:true,purchase:p,answer:S.composerTotal,expected:correctChange,penalty:0};
    if(S.budget<=0)S.gameOver=true;
    render();
    launchConfetti(12);
  } else {
    S.attempts++;
    if(S.attempts>=S.maxAttempts){
      // OUT OF ATTEMPTS
      const penalty=CONFIGS[S.difficulty].penalty;
      S.wrong++;S.streak=0;
      S.budget-=p.price+penalty;
      S.history.push({correct:false,purchase:p,answer:S.composerTotal,expected:correctChange});
      S.feedback={correct:false,purchase:p,answer:S.composerTotal,expected:correctChange,penalty};
      if(S.budget<=0)S.gameOver=true;
      render();
    } else {
      // Wrong but can retry
      const btn=document.getElementById('validateBtn');
      if(btn){btn.classList.remove('shake');void btn.offsetWidth;btn.classList.add('shake')}
      const ta=document.getElementById('totalAmount');
      if(ta){ta.style.color='#e53935';setTimeout(()=>{if(ta)ta.style.color='';},600)}
      const ai=document.getElementById('attemptsInfo');
      if(ai)ai.textContent=`❌ Pas tout à fait ! Encore ${S.maxAttempts-S.attempts} essai${S.maxAttempts-S.attempts>1?'s':''}.`;
    }
  }
}

function nextPurchase(){
  S.feedback=null;
  S.purchaseIndex++;
  S.attempts=0;
  S.composerItems=[];S.composerTotal=0;
  if(S.gameOver||S.purchaseIndex>=S.purchases.length){
    S.screen='result';
  }
  render();
}

// ════════════════════════════════════════════
// DENOMINATION SETS
// ════════════════════════════════════════════
function getDenoms(diff){
  if(diff==='easy') return{
    coins:[50,100,200],
    bills:[500,1000,2000,5000]
  };
  if(diff==='medium') return{
    coins:[5,10,20,50,100,200],
    bills:[500,1000,2000,5000]
  };
  return{
    coins:[1,2,5,10,20,50,100,200],
    bills:[500,1000,2000,5000,10000,20000]
  };
}

// ════════════════════════════════════════════
// RENDERING
// ════════════════════════════════════════════
const app=document.getElementById('app');

function render(){
  if(S.screen==='menu')renderMenu();
  else if(S.screen==='game')renderGame();
  else if(S.screen==='result')renderResult();
}

    <div class="diff-card card-easy" onclick="startGame('easy')">

      <span class="diff-badge">Débutant</span>
    </div>
    <div class="diff-card card-medium" onclick="startGame('medium')">

      <p>Montants avec centimes • Budget 350 € • 10 achats<br>2 essais par question • Pénalité : 3 €</p>
      <span class="diff-badge">Confirmé</span>
    </div>
    <div class="diff-card card-hard" onclick="startGame('hard')">

      ❌ <strong>Mauvaise réponse</strong> → tu perds une pénalité en plus<br>
      🏆 <strong>Objectif</strong> → Finir le mois avec de l'argent !<br><br>
      <em>Clique sur les pièces/billets pour composer le rendu, puis valide !</em>
    </div>
  `;
}

function renderGame(){
  const p=S.purchases[S.purchaseIndex];
  const cfg=CONFIGS[S.difficulty];
  const budgetPct=Math.max(0,Math.min(100,S.budget/S.initialBudget*100));
  const budgetColor=budgetPct>50?'#66bb6a':budgetPct>25?'#ffa726':'#e53935';
  const change=p.payment-p.price;
  const denoms=getDenoms(S.difficulty);

  let dotsHTML='';
  for(let i=0;i<S.purchases.length;i++){
    const h=S.history[i];
    let cls='dot';
    if(i<S.history.length)cls+= h.correct?' correct':' wrong';
    else if(i===S.purchaseIndex)cls+=' current';
    dotsHTML+=`<div class="${cls}"></div>`;
  }

  const storeCol=STORE_COLORS[p.store]||'linear-gradient(135deg,#78909c,#455a64)';

  let trayHTML='';
  if(S.composerItems.length===0){
    trayHTML='<div class="tray-empty">Cliquez sur les pièces/billets ci-dessus</div>';
  } else {
    S.composerItems.forEach((v,i)=>{
      const cls=v>=500?'tray-bill':'tray-coin';
      trayHTML+=`<div class="tray-item ${cls}" onclick="removeDenom(${i})" title="Cliquer pour retirer">${denomLabel(v)}</div>`;
    });
  }

  let totalClass='total-zero';
  if(S.composerTotal>0){
    if(S.composerTotal===change)totalClass='total-ok';
    else if(S.composerTotal>change)totalClass='total-over';
    else totalClass='total-partial';
  }

  let coinsHTML=denoms.coins.map(v=>
    `<button class="denom-btn coin-btn ${coinClass(v)}" onclick="addDenom(${v})">${denomLabel(v)}</button>`
  ).join('');

  let billsHTML=denoms.bills.map(v=>
    `<button class="denom-btn bill-btn ${billClass(v)}" onclick="addDenom(${v})">${denomLabel(v)}</button>`
  ).join('');

  app.innerHTML=`
    <div class="game-header">
      <div class="budget-box">
        <div class="budget-label">💰 Budget restant</div>
        <div class="budget-amount" style="color:${budgetColor}">${fmt(S.budget)}</div>
        <div class="budget-bar"><div class="budget-fill" style="width:${budgetPct}%;background:${budgetColor}"></div></div>
      </div>
      <div class="day-box">
        <div class="day-label">Achat</div>
        <div class="day-number">${S.purchaseIndex+1}/${S.purchases.length}</div>
        ${S.streak>=2?`<div class="streak-badge">🔥 ${S.streak} d'affilée</div>`:''}
      </div>
    </div>
    <div class="dots-row">${dotsHTML}</div>
    <div class="store-card" style="background:${storeCol}">
      <div class="store-emoji">${p.emoji}</div>
      <div class="store-name">${p.store}</div>
      <div class="store-item">Vous achetez : <strong>${p.item}</strong></div>
      <div class="store-price">${fmt(p.price)}</div>
      <div class="store-payment">Vous payez avec : ${describePayment(p.payment)}</div>
    </div>
    <div class="question-text">❓ Combien devez-vous recevoir ?</div>
    <div class="composer-section">
      <div class="denom-label">💰 Pièces</div>
      <div class="denom-grid">${coinsHTML}</div>
      <div class="denom-label">💵 Billets</div>
      <div class="denom-grid">${billsHTML}</div>
      <div class="tray" id="tray">${trayHTML}</div>
      <div class="total-display">
        <div class="total-label">Votre rendu monnaie :</div>
        <div class="total-amount ${totalClass}" id="totalAmount">${S.composerTotal>0?fmt(S.composerTotal):'— €'}</div>
      </div>
      <div class="composer-buttons">
        <button class="btn btn-clear" onclick="clearComposer()">🗑️ Effacer</button>
        <button class="btn btn-validate" id="validateBtn" onclick="validateChange()" ${S.composerTotal===0?'disabled':''}>✅ Valider</button>
      </div>
      <div class="attempts-info" id="attemptsInfo">
        ${S.attempts>0?`❌ Pas tout à fait ! Encore ${S.maxAttempts-S.attempts} essai${S.maxAttempts-S.attempts>1?'s':''}.`:`${S.maxAttempts} essai${S.maxAttempts>1?'s':''} possibles`}
      </div>
    </div>
  `;

  // Render feedback overlay if any
  if(S.feedback) renderFeedback();
}

function updateComposer(){
  const p=S.purchases[S.purchaseIndex];
  const change=p.payment-p.price;

  const tray=document.getElementById('tray');
  if(tray){
    if(S.composerItems.length===0){
      tray.innerHTML='<div class="tray-empty">Cliquez sur les pièces/billets ci-dessus</div>';
    } else {
      tray.innerHTML=S.composerItems.map((v,i)=>{
        const cls=v>=500?'tray-bill':'tray-coin';
        return`<div class="tray-item ${cls}" onclick="removeDenom(${i})" title="Cliquer pour retirer">${denomLabel(v)}</div>`;
      }).join('');
    }
  }

  let totalClass='total-zero';
  if(S.composerTotal>0){
    if(S.composerTotal===change)totalClass='total-ok';
    else if(S.composerTotal>change)totalClass='total-over';
    else totalClass='total-partial';
  }

  const ta=document.getElementById('totalAmount');
  if(ta){
    ta.textContent=S.composerTotal>0?fmt(S.composerTotal):'— €';
    ta.className='total-amount '+totalClass;
  }

  const vb=document.getElementById('validateBtn');
  if(vb)vb.disabled=S.composerTotal===0;
}

function renderFeedback(){
  const fb=S.feedback;
  const change=fb.expected;
  const decomp=decomposeMoney(change);
  const decomStr=decomp.join(' + ');

  const overlay=document.createElement('div');
  overlay.className='feedback-overlay';
  overlay.id='feedbackOverlay';
  overlay.innerHTML=`
    <div class="feedback-card">
      <div class="fb-emoji">${fb.correct?'🎉':'😕'}</div>
      <div class="fb-title" style="color:${fb.correct?'#43a047':'#e53935'}">${fb.correct?'Bravo, c\'est exact !':'Pas cette fois...'}</div>
      <div class="fb-calc">
        ${fmt(fb.purchase.payment)} − ${fmt(fb.purchase.price)} = <strong>${fmt(change)}</strong>
      </div>
      ${!fb.correct?`<div style="font-size:.88em;font-weight:600;color:#546e7a;margin-bottom:4px">Vous aviez répondu : ${fmt(fb.answer)}</div>`:''}
      <div class="fb-decomp">Soit : ${decomStr}</div>
      ${fb.penalty>0?`<div class="fb-penalty">⚠️ Pénalité : −${fmt(fb.penalty)}</div>`:''}
      <div class="fb-budget">Budget restant : <strong style="color:${S.budget>0?'#43a047':'#e53935'}">${fmt(S.budget)}</strong></div>
      ${S.gameOver&&S.budget<=0?'<div class="fb-penalty">💸 Budget épuisé !</div>':''}
      <button class="btn-next" onclick="nextPurchase()">${
        S.gameOver||S.purchaseIndex>=S.purchases.length-1?'Voir les résultats →':'Achat suivant →'
      }</button>
    </div>
  `;
  app.appendChild(overlay);
}

function renderResult(){
  const won=S.budget>0;
  const pct=Math.round(S.correct/S.purchases.length*100);
  const totalSpent=S.initialBudget-S.budget;

  app.innerHTML=`
    <div class="result-screen">
      <div class="result-emoji">${won?'🏆🎉':'💸😅'}</div>
      <div class="result-title" style="color:${won?'#43a047':'#e53935'}">${won?'Bravo, mois réussi !':'Budget épuisé !'}</div>
      <div class="result-subtitle">${won?'Tu as bien géré ton budget ce mois-ci !':'Il faudra être plus précis la prochaine fois !'}</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-val" style="color:${S.budget>0?'#43a047':'#e53935'}">${fmt(S.budget)}</div>
          <div class="stat-lbl">Budget final</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" style="color:#1e88e5">${S.correct}/${S.purchases.length}</div>
          <div class="stat-lbl">Réponses correctes</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" style="color:#ff9800">${pct}%</div>
          <div class="stat-lbl">Taux de réussite</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" style="color:#e91e63">${S.bestStreak}🔥</div>
          <div class="stat-lbl">Meilleure série</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" style="color:#546e7a">${fmt(totalSpent-totalPenalties)}</div>
          <div class="stat-lbl">Total des achats</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" style="color:#e53935">${totalPenalties>0?'-'+fmt(totalPenalties):'0 €'}</div>
          <div class="stat-lbl">Pénalités</div>
        </div>
      </div>
      ${pct===100?'<div style="font-size:1.2em;font-weight:800;color:#43a047;margin-bottom:16px">🌟 SANS FAUTE ! Tu es un·e pro du rendu monnaie ! 🌟</div>':''}
      ${pct>=80&&pct<100?'<div style="font-size:1em;font-weight:700;color:#1e88e5;margin-bottom:16px">Très bien ! Encore un effort pour le sans-faute 💪</div>':''}
      ${pct<80&&pct>=50?'<div style="font-size:1em;font-weight:700;color:#ff9800;margin-bottom:16px">Pas mal ! Continue à t\'entraîner 📚</div>':''}
      ${pct<50?'<div style="font-size:1em;font-weight:700;color:#e53935;margin-bottom:16px">Courage ! La pratique rend parfait 🔄</div>':''}
      <button class="btn-replay" onclick="startGame('${S.difficulty}')">🔄 Rejouer (${CONFIGS[S.difficulty].label})</button><br>
      <button class="btn-menu" onclick="S.screen='menu';render()">← Retour au menu</button>
    </div>
  `;
  if(won)launchConfetti(40);
}

// ════════════════════════════════════════════
// CONFETTI
// ════════════════════════════════════════════
function launchConfetti(count){
  const c=document.getElementById('confetti');
  const colors=['#e91e63','#9c27b0','#3f51b5','#00bcd4','#4caf50','#ff9800','#fdd835','#ff5722'];
  for(let i=0;i<count;i++){
    const el=document.createElement('div');
    el.style.cssText=`position:absolute;left:${Math.random()*100}%;top:-10px;width:${Math.random()*10+5}px;height:${Math.random()*10+5}px;background:${colors[randInt(0,colors.length-1)]};border-radius:${Math.random()>.5?'50%':'2px'};animation:confetti-fall ${Math.random()*2+2}s ease-out ${Math.random()*.5}s forwards;`;
    c.appendChild(el);
  }
  setTimeout(()=>c.innerHTML='',5000);
}

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
render();
</script>
